<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Demo — Landseed in a working landscape</title>
<meta name="description" content="A living landscape with every Landseed sensor at work — intrusions detected, alerts relayed by radio and satellite, elephants turned before the crops, calls triangulated in the forest. Watch the whole system run." />
<meta name="theme-color" content="#070F07" />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./demo.css?v=45" />
<link rel="modulepreload" href="https://unpkg.com/three@0.160.0/build/three.module.js" />
<link rel="preload" as="fetch" href="./assets/soldier.glb" crossorigin />
<link rel="preload" as="fetch" href="./assets/wolf.glb" crossorigin />
</head>
<body class="booting">

<canvas id="scene"></canvas>

<div id="loader"><img class="loader-word" src="/public/landseed-wordmark.svg" alt="Landseed" /><span>building the landscape</span></div>

<!-- film chrome -->
<div class="bar bar-t"></div>
<div class="bar bar-b"></div>
<div id="vignette"></div>

<header class="hud">
  <a class="brand" href="/" title="Back to the catalogue"><img class="b-word" src="/public/landseed-wordmark.svg" alt="Landseed" /></a>
  <div class="hud-right"><a class="hud-tag hud-link" id="terr" href="./?terrain=real" style="display:none">Real terrain ↗</a><span class="hud-tag" id="hud-mode">Field Demonstration</span></div>
</header>

<!-- opening title -->
<div id="title">
  <h1>One landscape.<br>Every sensor working.</h1>
  <p>A working landscape with every Landseed device on station.<br>78 seconds · seven products · one connected system.</p>
</div>

<!-- chapter caption, bottom left -->
<div id="cap">
  <div id="cap-k"></div>
  <div id="cap-t"></div>
  <p id="cap-l"></p>
  <div id="cap-m"></div>
</div>

<!-- live alerts — the rangers' phone -->
<aside id="phone" aria-label="live alerts">
  <div class="ph-island"></div>
  <div class="ph-status"><span id="feed-clock">06:41</span><span class="ph-icons"><i class="sig"><b></b><b></b><b></b><b></b></i>5G<i class="bat"><b></b></i></span></div>
  <div class="tg-head">
    <img class="tg-ava" src="/public/landseed-ai-mark.png" alt="" />
    <div class="tg-who"><b>Landseed AI</b><span>bot &middot; alerts on</span></div>
  </div>
  <div id="feed-list" class="tg-body"><div class="tg-day"><span>Today</span></div></div>
  <div class="tg-input"><span>Message</span><i class="tg-mic">&#127908;</i></div>
</aside>

<!-- projected detection cards -->
<div id="pops"></div>

<!-- chapters + controls -->
<nav id="chapters">
  <button class="chip" data-ch="overview">Overview</button>
  <button class="chip" data-ch="intrusion">Intrusion</button>
  <button class="chip" data-ch="response">Response</button>
  <button class="chip" data-ch="coexist">Coexistence</button>
  <button class="chip" data-ch="listening">Listening</button>
  <button class="chip" data-ch="network">The Network</button>
  <span class="chip-div"></span>
  <a class="chip cta" href="/">Catalogue</a>
</nav>

<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module" src="./demo.js?v=157"></script>
</body>
</html>
